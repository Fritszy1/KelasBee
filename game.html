<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tebak Kata — Kelas 8B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --navy:#14213D; --navy-2:#1F2E52; --gold:#C9A24A; --gold-soft:#E4CE94;
    --cream:#F7F4EE; --ink:#22252B; --ink-soft:#5B6270; --maroon:#7A2331;
    --line-light: rgba(255,255,255,0.55);
    --card-bg: rgba(255,255,255,0.42);
    --glass-shadow: 0 8px 32px rgba(20,33,61,0.14);
    --glass-blur: blur(20px) saturate(180%);
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; font-family:'Inter',sans-serif; color:var(--ink);
    background:var(--cream); padding-bottom:40px;
  }
  h1,h2,.display{font-family:'Fraunces',serif;}
  .bg-orb{position:fixed; border-radius:50%; filter:blur(70px); z-index:-1; opacity:0.55; pointer-events:none;}
  .bg-orb1{width:380px; height:380px; background:#C9A24A; top:-100px; left:-100px;}
  .bg-orb2{width:340px; height:340px; background:#7A2331; top:40vh; right:-120px; opacity:0.35;}
  .bg-orb3{width:300px; height:300px; background:#14213D; bottom:-100px; left:10vw; opacity:0.3;}

  header{
    background:rgba(20,33,61,0.6); backdrop-filter:blur(20px) saturate(180%);
    color:#fff; padding:16px 20px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,0.15);
  }
  header a{color:var(--gold-soft); text-decoration:none; font-size:13px; font-weight:600;}
  header h1{margin:0; font-size:18px;}

  .wrap{max-width:520px; margin:0 auto; padding:24px 18px;}
  .glass{
    background:var(--card-bg); backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur);
    border:1px solid var(--line-light); border-radius:var(--radius); box-shadow:var(--glass-shadow);
    padding:22px;
  }
  .eyebrow{font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--maroon);}
  .screen{display:none;}
  .screen.active{display:block;}

  /* pilih pemain */
  .player-select{width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line-light); font-size:15px; font-family:inherit; background:#fff; margin-top:14px;}
  .player-preview{display:flex; align-items:center; gap:14px; margin-top:18px; min-height:64px;}
  .player-preview img{width:64px; height:64px; border-radius:50%; object-fit:cover; border:2px solid var(--gold);}
  .player-preview .no-photo{width:64px; height:64px; border-radius:50%; background:var(--navy); color:var(--gold-soft); display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:700; font-size:20px;}
  .start-btn{
    margin-top:20px; width:100%; padding:13px; border:none; border-radius:999px;
    background:var(--gold); color:var(--navy); font-weight:700; font-size:15px; cursor:pointer;
  }
  .start-btn:disabled{opacity:0.4; cursor:not-allowed;}

  /* main game */
  .game-top{display:flex; gap:16px; align-items:flex-start; margin-bottom:18px;}
  .gallows-box{
    width:110px; height:150px; flex-shrink:0; background:rgba(255,255,255,0.35);
    border-radius:12px; border:1px solid var(--line-light); position:relative;
  }
  .gallows-box svg{width:100%; height:100%; display:block;}
  .hg-part{
    stroke:var(--navy); stroke-width:3.5; stroke-linecap:round; opacity:0;
    transition:opacity .35s ease;
  }
  .hg-part.shown{opacity:1;}
  .hg-head{opacity:0; transition:opacity .35s ease;}
  .hg-head.shown{opacity:1;}
  .game-meta{flex:1;}
  .game-meta .cat{font-size:11px; color:var(--maroon); font-weight:700; text-transform:uppercase; letter-spacing:0.05em;}
  .game-meta .clue{font-size:13.5px; color:var(--ink-soft); margin-top:2px;}
  .wrong-count{font-size:12px; color:var(--ink-soft); margin-top:4px;}

  .word-blanks{
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:18px 0;
  }
  .letter-slot{
    width:32px; height:38px; border-bottom:3px solid var(--navy); display:flex; align-items:center;
    justify-content:center; font-family:'Fraunces',serif; font-weight:700; font-size:20px;
  }

  .keyboard{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:8px;}
  .key{
    width:30px; height:36px; border-radius:8px; border:1px solid var(--line-light);
    background:rgba(255,255,255,0.6); font-weight:700; font-size:13px; cursor:pointer; color:var(--ink);
  }
  .key.correct{background:#4A7A5E; color:#fff; border-color:#4A7A5E;}
  .key.wrong{background:var(--maroon); color:#fff; border-color:var(--maroon);}
  .key:disabled{cursor:default;}

  /* hasil */
  .result-emoji{font-size:44px; text-align:center;}
  .result-title{font-family:'Fraunces',serif; font-weight:700; font-size:22px; text-align:center; margin:6px 0 4px;}
  .result-sub{text-align:center; color:var(--ink-soft); font-size:14px; margin-bottom:16px;}
  .result-score{text-align:center; font-family:'Fraunces',serif; font-size:34px; font-weight:700; color:var(--gold); margin-bottom:16px;}
  .again-btn{
    width:100%; padding:13px; border:none; border-radius:999px; background:var(--navy);
    color:var(--gold-soft); font-weight:700; font-size:15px; cursor:pointer;
  }

  /* leaderboard */
  .leaderboard{margin-top:22px;}
  .leaderboard h2{font-size:17px; margin-bottom:12px;}
  .lb-row{display:flex; align-items:center; gap:10px; padding:9px 4px; border-bottom:1px solid var(--line-light); font-size:13.5px;}
  .lb-rank{width:22px; font-weight:700; color:var(--maroon); flex-shrink:0;}
  .lb-photo{width:32px; height:32px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--navy);}
  .lb-name{flex:1; font-weight:600;}
  .lb-score{font-weight:700; color:var(--gold-soft); background:var(--navy); padding:3px 10px; border-radius:999px; font-size:12px;}
  .lb-empty{color:var(--ink-soft); font-size:13px; text-align:center; padding:14px;}
</style>
</head>
<body>

<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>
<div class="bg-orb bg-orb3"></div>

<header>
  <h1>🔤 Tebak Kata Kelas</h1>
  <a href="index.html">← Kembali ke Web Kelas</a>
</header>

<div class="wrap">

  <!-- SCREEN 1: pilih pemain -->
  <div class="screen active glass" id="screen-select">
    <div class="eyebrow">Sebelum Main</div>
    <h2>Kamu siapa?</h2>
    <select class="player-select" id="playerSelect">
      <option value="">-- Pilih namamu --</option>
    </select>
    <div class="player-preview" id="playerPreview"></div>
    <button class="start-btn" id="startBtn" disabled>Mulai Main</button>
  </div>

  <!-- SCREEN 2: game -->
  <div class="screen glass" id="screen-game">
    <div class="game-top">
      <div class="gallows-box" id="gallowsBox"></div>
      <div class="game-meta">
        <div class="cat" id="gameCat">Umum</div>
        <div class="clue" id="gameClue">Petunjuk kata...</div>
        <div class="wrong-count" id="gameWrong">Salah: 0 / 7</div>
      </div>
    </div>
    <div class="word-blanks" id="wordBlanks"></div>
    <div class="keyboard" id="keyboard"></div>
  </div>

  <!-- SCREEN 3: hasil -->
  <div class="screen glass" id="screen-result">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">Kamu Menang!</div>
    <div class="result-sub" id="resultSub">Katanya adalah ...</div>
    <div class="result-score" id="resultScore">0</div>
    <button class="again-btn" id="againBtn">Main Lagi</button>
  </div>

  <div class="glass leaderboard">
    <h2>🏆 Leaderboard Kelas</h2>
    <div id="leaderboardList"><div class="lb-empty">Memuat...</div></div>
  </div>

</div>

<script>
/* Pakai project Firebase yang sama dengan web utama kelas */
const firebaseConfig = {
  apiKey: "AIzaSyD2R1ThckR6lSG_vSncKFM7Xob72I28OCw",
  authDomain: "kelasbee.firebaseapp.com",
  databaseURL: "https://kelasbee-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kelasbee",
  storageBucket: "kelasbee.firebasestorage.app",
  messagingSenderId: "251093516263",
  appId: "1:251093516263:web:10e270b48fe19884c40742",
  measurementId: "G-QSTE9B2YEQ"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const membersRef = db.ref('kelasWebsite/members');
const leaderboardRef = db.ref('publicInteractions/hangmanLeaderboard');

const WORD_BANK = [
  {word:'KOMPUTER', clue:'Alat elektronik buat ngerjain tugas & main game', cat:'Umum'},
  {word:'PERPUSTAKAAN', clue:'Tempat pinjam buku di sekolah', cat:'Umum'},
  {word:'GUNUNG', clue:'Dataran tinggi, biasa didaki', cat:'Umum'},
  {word:'PELANGI', clue:'Muncul setelah hujan, banyak warna', cat:'Umum'},
  {word:'SEPEDA', clue:'Kendaraan roda dua, dikayuh pakai kaki', cat:'Umum'},
  {word:'GITAR', clue:'Alat musik berdawai, biasa dipetik', cat:'Umum'},
  {word:'MATAHARI', clue:'Bersinar terang di siang hari', cat:'Umum'},
  {word:'BINTANG', clue:'Bersinar di langit malam', cat:'Umum'},
  {word:'PETUALANGAN', clue:'Perjalanan seru penuh tantangan', cat:'Umum'},
  {word:'PERSAHABATAN', clue:'Ikatan erat antar teman', cat:'Umum'},
  {word:'LABORATORIUM', clue:'Tempat praktik IPA di sekolah', cat:'Umum'},
  {word:'PIKET', clue:'Tugas bersih-bersih kelas bergiliran', cat:'Kelas 8B'},
  {word:'PRESTASI', clue:'Pencapaian yang dibanggakan', cat:'Kelas 8B'},
  {word:'PENGUMUMAN', clue:'Info penting yang disampaikan ke semua anak', cat:'Kelas 8B'},
  {word:'WALIKELAS', clue:'Guru pembimbing utama satu kelas', cat:'Kelas 8B'},
  {word:'TERTIB', clue:'Lawan kata berantakan, sesuai aturan', cat:'Kelas 8B'},
  {word:'UJIAN', clue:'Bikin deg-degan, diadain buat tes nilai', cat:'Kelas 8B'},
  {word:'LIBUR', clue:'Hari tanpa sekolah, paling ditunggu', cat:'Kelas 8B'},
  {word:'EKSTRAKURIKULER', clue:'Kegiatan di luar jam pelajaran wajib', cat:'Kelas 8B'},
  {word:'SERAGAM', clue:'Baju yang wajib dipakai ke sekolah', cat:'Kelas 8B'},
  {word:'RAPOR', clue:'Kertas laporan nilai tiap semester', cat:'Kelas 8B'},
  {word:'KANTIN', clue:'Tempat jajan pas istirahat', cat:'Kelas 8B'},
  {word:'UPACARA', clue:'Diadain tiap Senin pagi di lapangan', cat:'Kelas 8B'}
];

const MAX_WRONG = 7;
const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

let members = [];
let currentPlayer = null;
let currentWord = null;
let guessedLetters = [];
let wrongCount = 0;
let startTime = 0;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=> s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------- Ambil daftar anggota kelas dari Firebase ---------- */
membersRef.once('value').then(snap=>{
  members = snap.val() || [];
  const select = document.getElementById('playerSelect');
  members.forEach((m, i)=>{
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = m.name;
    select.appendChild(opt);
  });
}).catch(err=>{
  console.error('Gagal ambil data anggota:', err);
});

document.getElementById('playerSelect').addEventListener('change', (e)=>{
  const idx = e.target.value;
  const preview = document.getElementById('playerPreview');
  const startBtn = document.getElementById('startBtn');
  if(idx === ''){
    preview.innerHTML = '';
    startBtn.disabled = true;
    currentPlayer = null;
    return;
  }
  currentPlayer = members[idx];
  const initials = (currentPlayer.name||'?').trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  preview.innerHTML = currentPlayer.photo
    ? `<img src="${currentPlayer.photo}" alt="${currentPlayer.name}"><div><strong>${currentPlayer.name}</strong><br><span style="color:var(--ink-soft); font-size:12.5px;">Siap main?</span></div>`
    : `<div class="no-photo">${initials}</div><div><strong>${currentPlayer.name}</strong><br><span style="color:var(--ink-soft); font-size:12.5px;">Siap main?</span></div>`;
  startBtn.disabled = false;
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('againBtn').addEventListener('click', ()=>{ showScreen('screen-select'); });

function startGame(){
  currentWord = WORD_BANK[Math.floor(Math.random()*WORD_BANK.length)];
  guessedLetters = [];
  wrongCount = 0;
  startTime = Date.now();

  document.getElementById('gameCat').textContent = currentWord.cat;
  document.getElementById('gameClue').textContent = currentWord.clue;
  document.getElementById('gameWrong').textContent = `Salah: 0 / ${MAX_WRONG}`;

  buildGallows();
  renderBlanks();
  renderKeyboard();
}

// Urutan tahap gambar tiang gantungan, tepat 7 tahap sesuai MAX_WRONG
const GALLOWS_STAGES = [
  ['hg-base'],
  ['hg-pole'],
  ['hg-beam','hg-rope'],
  ['hg-head'],
  ['hg-torso'],
  ['hg-arm-l','hg-arm-r'],
  ['hg-leg-l','hg-leg-r']
];

function buildGallows(){
  const initials = (currentPlayer.name||'?').trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const headContent = currentPlayer.photo
    ? `<image href="${currentPlayer.photo}" x="70" y="30" width="30" height="30" clip-path="url(#headClip)" preserveAspectRatio="xMidYMid slice"/>`
    : `<circle cx="85" cy="45" r="15" fill="#14213D"/><text x="85" y="50" text-anchor="middle" font-family="Fraunces,serif" font-weight="700" font-size="13" fill="#E4CE94">${initials}</text>`;

  document.getElementById('gallowsBox').innerHTML = `
    <svg viewBox="0 0 120 160">
      <defs><clipPath id="headClip"><circle cx="85" cy="45" r="15"/></clipPath></defs>
      <line id="hg-base" class="hg-part" x1="15" y1="150" x2="65" y2="150"/>
      <line id="hg-pole" class="hg-part" x1="30" y1="150" x2="30" y2="15"/>
      <line id="hg-beam" class="hg-part" x1="30" y1="15" x2="85" y2="15"/>
      <line id="hg-rope" class="hg-part" x1="85" y1="15" x2="85" y2="30"/>
      <g id="hg-head" class="hg-head">
        ${headContent}
        <circle cx="85" cy="45" r="15" fill="none" stroke="#7A2331" stroke-width="2"/>
      </g>
      <line id="hg-torso" class="hg-part" x1="85" y1="60" x2="85" y2="100"/>
      <line id="hg-arm-l" class="hg-part" x1="85" y1="72" x2="68" y2="88"/>
      <line id="hg-arm-r" class="hg-part" x1="85" y1="72" x2="102" y2="88"/>
      <line id="hg-leg-l" class="hg-part" x1="85" y1="100" x2="68" y2="122"/>
      <line id="hg-leg-r" class="hg-part" x1="85" y1="100" x2="102" y2="122"/>
    </svg>
  `;
}

function revealGallowsStage(n){
  // Tampilkan semua tahap sampai kesalahan ke-n
  for(let i=0; i<n; i++){
    (GALLOWS_STAGES[i]||[]).forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.classList.add('shown');
    });
  }
}

function renderBlanks(){
  const wrap = document.getElementById('wordBlanks');
  wrap.innerHTML = '';
  currentWord.word.split('').forEach(ch=>{
    const slot = document.createElement('div');
    slot.className = 'letter-slot';
    slot.textContent = guessedLetters.includes(ch) ? ch : '';
    wrap.appendChild(slot);
  });
}

function renderKeyboard(){
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  ALPHABET.forEach(letter=>{
    const btn = document.createElement('button');
    btn.className = 'key';
    btn.textContent = letter;
    btn.onclick = ()=> guessLetter(letter);
    kb.appendChild(btn);
  });
  showScreen('screen-game');
}

function guessLetter(letter){
  if(guessedLetters.includes(letter)) return;
  guessedLetters.push(letter);

  const keys = document.querySelectorAll('.key');
  const btn = Array.from(keys).find(b=> b.textContent === letter);

  if(currentWord.word.includes(letter)){
    if(btn) btn.classList.add('correct');
  } else {
    wrongCount++;
    if(btn) btn.classList.add('wrong');
    document.getElementById('gameWrong').textContent = `Salah: ${wrongCount} / ${MAX_WRONG}`;
    revealGallowsStage(wrongCount);
  }
  if(btn) btn.disabled = true;

  renderBlanks();

  const won = currentWord.word.split('').every(ch=> guessedLetters.includes(ch));
  if(won){ endGame(true); return; }
  if(wrongCount >= MAX_WRONG){ endGame(false); return; }
}

function endGame(won){
  const elapsed = Math.round((Date.now()-startTime)/1000);
  if(won){ revealGallowsStage(MAX_WRONG); } // menang tetap nampilin sosoknya utuh sebagai bonus lucu-lucuan

  let score = 0;
  if(won){
    score = (MAX_WRONG - wrongCount) * 100 + Math.max(0, 60 - elapsed) * 5;
  }

  document.getElementById('resultEmoji').textContent = won ? '🎉' : '😅';
  document.getElementById('resultTitle').textContent = won ? 'Kamu Menang!' : 'Ketahuan Deh!';
  document.getElementById('resultSub').textContent = `Katanya adalah "${currentWord.word}"`;
  document.getElementById('resultScore').textContent = won ? score : '0';
  showScreen('screen-result');

  leaderboardRef.push({
    name: currentPlayer.name,
    photo: currentPlayer.photo || null,
    score: score,
    won: won,
    wrongCount: wrongCount,
    timeSeconds: elapsed,
    timestamp: Date.now()
  }).catch(err=> console.error('Gagal simpan skor:', err));
}

// Dukungan keyboard fisik
document.addEventListener('keydown', (e)=>{
  if(!document.getElementById('screen-game').classList.contains('active')) return;
  const letter = e.key.toUpperCase();
  if(ALPHABET.includes(letter)) guessLetter(letter);
});

/* ---------- Leaderboard realtime ---------- */
leaderboardRef.orderByChild('score').limitToLast(10).on('value', snap=>{
  const val = snap.val() || {};
  const rows = Object.values(val).sort((a,b)=> b.score - a.score);
  const list = document.getElementById('leaderboardList');
  if(!rows.length){
    list.innerHTML = '<div class="lb-empty">Belum ada yang main. Jadi yang pertama!</div>';
    return;
  }
  list.innerHTML = rows.map((r,i)=>{
    const photoHtml = r.photo
      ? `<img class="lb-photo" src="${r.photo}" alt="${r.name}">`
      : `<div class="lb-photo" style="display:flex;align-items:center;justify-content:center;color:#E4CE94;font-size:11px;font-weight:700;">${(r.name||'?')[0]}</div>`;
    return `<div class="lb-row"><span class="lb-rank">#${i+1}</span>${photoHtml}<span class="lb-name">${r.name}</span><span class="lb-score">${r.score}</span></div>`;
  }).join('');
});
</script>
</body>
</html>
